name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: solidita
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres -d solidita"
          --health-interval 5s --health-timeout 3s --health-retries 10
    defaults:
      run:
        working-directory: backend
    env:
      MIGRATION_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/solidita
      DATABASE_URL: postgresql+asyncpg://solidita_app:solidita_app@localhost:5432/solidita
      JWT_SECRET_KEY: ci-test-secret-do-not-use-in-prod
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Bootstrap app role
        run: psql "postgresql://postgres:postgres@localhost:5432/solidita" -f ../infra/postgres/init.sql
      - name: Lint
        run: ruff check .
      - name: Migrate
        run: alembic upgrade head
      - name: Test
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci || npm install
      - run: npm run build
